name: 🚀 CI & Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # Gate dur : lint (0 erreur) + typecheck + tests doivent passer.
      # NB: 176 warnings hérités tolérés (no-explicit-any en warn).
      - name: 🔍 Lint
        run: npm run lint


      - name: 🧠 Typecheck
        run: npm run typecheck

      - name: ✅ Unit tests
        run: npm test

  deploy:
    name: 🚀 Deploy
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Le CLI Vercel lit automatiquement VERCEL_TOKEN depuis l'env.
      VERCEL_TOKEN: ${{ secrets.COLL_VERCEL_TOKEN }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes

      - name: 🔎 Deploy to Vercel (preview)
        if: github.ref == 'refs/heads/staging'
        run: npx vercel --yes
